<!DOCTYPE html>
<html lang="zh-cmn-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="preload" as="fetch" crossorigin href="ysqd.ogg" />
    <link rel="prefetch" as="image" href="ysqd.png" />
    <title>《原神启动器》</title>
    <style>
      :root {
        background-color: white;
        color: black;
        user-select: none;
      }
      #text {
        white-space: pre-wrap;
      }
      #img {
        position: absolute;
        margin: auto;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        animation: fadein 2s;
      }
      @keyframes fadein {
        from {
          opacity: 0;
        }
      }
      #img.fadeout {
        animation: fadeout 5s forwards;
      }
      @keyframes fadeout {
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <main id="main">
      <div id="text">正在加载音频</div>
      <div id="buttons">
        给手机用户准备的按钮，显然我一开始偷懒了只支持键盘输入，但现在有了
        <button onclick="skip=4;prepare()">1</button>
        <button onclick="skip=3;prepare()">2</button>
        <button onclick="skip=2;prepare()">3</button>
        <button onclick="skip=1;prepare()">4</button>
        <button onclick="skip=0;prepare()">5</button>
      </div>
      <img hidden id="img" src="ysqd.png" />
    </main>
    <script>
      let disabled = false
      let skip = 0
      const skipTimes = [
        0, 18.23392290249433, 33.97163265306123, 41.83956916099773,
        47.74273242630385,
      ]
      const skipNames = [
        "3 段循环前摇",
        "2 段循环前摇",
        "1 段循环前摇",
        "短前摇",
        "无前摇",
      ]
      const auCtx = new AudioContext()
      const src = auCtx.createBufferSource()
      const gain = auCtx.createGain()
      const qidongTime = 49.70750566893424
      const bufferPromise = fetch("ysqd.ogg")
        .then(resp => resp.arrayBuffer())
        .then(aub => {
          disabled = false
          prepare()
          return aub
        })

      gain.connect(auCtx.destination)

      async function start() {
        started = true
        buttons.hidden = true
        auCtx.resume()
        const buffer = await bufferPromise
        const aub = await auCtx.decodeAudioData(buffer)
        const skipTime = skipTimes[skip]
        let aub2 = aub
        if (skipTime) {
          const skipSamples = Math.round(skipTime * aub.sampleRate)
          aub2 = auCtx.createBuffer(
            aub.numberOfChannels,
            aub.length - skipSamples,
            aub.sampleRate
          )
          for (let i = 0; i < aub.numberOfChannels; i++) {
            aub2
              .getChannelData(i)
              .set(aub.getChannelData(i).subarray(skipSamples))
          }
        }
        src.buffer = aub2
        src.connect(gain)
        src.onended = () => {
          src.disconnect()
          auCtx.close()
          clearInterval(h)
        }
        let startAt = auCtx.currentTime + 0.1
        src.start(startAt)
        let offset = startAt - skipTime

        const h = setInterval(() => {
          if (auCtx.currentTime - startAt > src.loopEnd)
          startAt += src.loopEnd - src.loopStart
          const time = auCtx.currentTime - startAt
          text.textContent = src.loop
            ? `\
播放中
最快可在 ${(qidongTime - skipTime - time).toFixed(1)} 秒后启动
${
  time < src.loopStart
    ? `${(src.loopStart - time).toFixed(1)} 秒后进入循环`
    : `${(src.loopEnd - time).toFixed(1)} 秒后将循环，点击屏幕进入下一乐段`
}`
            : `播放中\n${(qidongTime - skipTime - time).toFixed(1)} 秒后启动`
          disabled = time < src.loopStart

          if (time >= qidongTime - skipTime) {
            text.hidden = true
            img.hidden = false
            setTimeout(() => {
              canTriggerFadeOut = true
            }, 2000)
            clearInterval(h)
          }
        }, 50)
      }

      let running = false
      let started = false
      let i = 0
      let canTriggerFadeOut = false
      function next() {
        if (canTriggerFadeOut) {
          img.classList.add("fadeout")
          gain.gain.linearRampToValueAtTime(0, auCtx.currentTime + 5)
          canTriggerFadeOut = false
        }
        if (running || disabled) return
        running = true
        if (!started) start()
        switch (i++) {
          case 0:
            src.loop = true
            src.loopStart = 10.365079365079365 - skipTimes[skip]
            src.loopEnd = 18.23392290249433 - skipTimes[skip]
            break
          case 1:
            src.loop = true
            src.loopStart = 18.23392290249433 - skipTimes[skip]
            src.loopEnd = 33.97163265306123 - skipTimes[skip]
            break
          case 2:
            src.loop = true
            src.loopStart = 33.97163265306123 - skipTimes[skip]
            src.loopEnd = 41.83956916099773 - skipTimes[skip]
            break
          default:
            src.loop = false
            src.loopStart = qidongTime - skipTimes[skip]
            src.loopEnd = qidongTime - skipTimes[skip]
            break
        }
        running = false
      }

      document.onclick = ev => {
        if (ev.target.tagName === "BUTTON") return
        next()
      }

      document.onkeydown = ev => {
        if (started) return
        if ([..."12345"].includes(ev.key)) {
          skip = 5 - ev.key
          prepare()
        }
      }
      function prepare() {
        i = skip
        text.textContent = `${skipNames[skip]}，启动时间 ${(qidongTime - skipTimes[skip]).toFixed(1)} 秒\n按 1-5 选择前摇长度\n使用方法：点击屏幕开始播放启动的小曲（“Shed a Light (Like Instrumental Mix)”），前摇会自动循环，点击屏幕离开当前循环进入下一段，直到最后进入副歌部分，此时会显示原神启动画面，点击屏幕停止播放`
      }
    </script>
  </body>
</html>
